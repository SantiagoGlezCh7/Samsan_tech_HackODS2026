name: Quarto Site CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Setup Quarto CLI
      uses: quarto-dev/quarto-actions/setup-quarto@v2
      with:
        quarto-version: latest

    - name: Make build script executable and run build
      run: |
        chmod +x ./scripts/build_site.sh
        ./scripts/build_site.sh

    - name: Upload docs artifact for preview
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: docs

    - name: Commit built site to main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs || true
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Automated site build [skip ci]"
          git push origin HEAD:main
        fi
